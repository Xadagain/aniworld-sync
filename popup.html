<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="popup.css">
  <title>AniWorld Backup</title>
</head>
<body>
  <main>
    <h1>AniWorld Backup</h1>
    <p id="status">No lists backed up yet.</p>
    <dl>
      <div><dt>Watchlist</dt><dd id="watchlist-count">0</dd></div>
      <div><dt>Subscriptions</dt><dd id="subscriptions-count">0</dd></div>
    </dl>
    <button id="export" type="button">Download JSON</button>
    <p class="hint">Open your Watchlist and then Subscriptions. The extension updates the file automatically. Firefox error details appear above.</p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
